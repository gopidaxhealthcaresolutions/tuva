version: 2

models:
  - name: hcc_recapture__recapture_rates
    description: HCC recapture rates by payment year.
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_hcc_recapture
        {% else %}hcc_recapture{%- endif -%}
      alias: recapture_rates
      tags: [ "hcc_recapture", "final" ]
      materialized: table
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - payer
              - payment_year
    columns:
      - name: payer
        description: The name of the person (i.e. beneficiary) insurance provider.
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: payment_year
        description: >
          This is the year that the HCC should be coded. Typically the
          collection year + 1, but for open HCCs it will be the collection year
          + 2.  To illustrate, if we have an HCC claim in 2023, but not in 2024,
          that means it is open in 2024. The payment year is 2024 + 1 = 2025.
          So  an open HCC from 2023 will have a payment year = 2025.
        config:
          meta:
            data_type: integer
            is_primary_key: true
      - name: no_suspects_closed_hccs
        description: The number of HCCs that were closed in the payment year excluding
          suspect HCCs. See the definition of closed HCCs in the gap_status
          field in the gap_status model.
        config:
          meta:
            data_type: integer
      - name: no_suspects_open_hccs
        description: The number of HCCs that are open in the payment year excluding
          suspect HCCs. See the definition of open HCCs in the gap_status field
          in the gap_status model.
        config:
          meta:
            data_type: integer
      - name: no_suspects_total_hccs
        description: The total number of HCCs that were open or closed in the payment
          year excluding suspect HCCs. Excludes new and inappropriate for
          recapture HCCs.
        config:
          meta:
            data_type: integer
      - name: no_suspects_recapture_rate
        description: Closed HCCs divided by no suspects total HCCs in the given payment
          year excluding suspect HCCs.
        config:
          meta:
            data_type: number
      - name: closed_hccs
        description: The number of HCCs that were closed in the payment year. See the
          definition of closed HCCs in the gap_status field in the gap_status
          model.
        config:
          meta:
            data_type: integer
      - name: open_hccs
        description: The number of HCCs that are open in the payment year. See the
          definition of open HCCs in the gap_status field in the gap_status
          model.
        config:
          meta:
            data_type: integer
      - name: total_hccs
        description: The total number of HCCs that were open or closed in the payment
          year. Excludes new and inappropriate for recapture HCCs.
        config:
          meta:
            data_type: integer
      - name: recapture_rate
        description: Closed HCCs divided by total HCCs in the given payment year.
        config:
          meta:
            data_type: number

  - name: hcc_recapture__recapture_rates_monthly
    description: HCC recapture rates by payment year month.
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_hcc_recapture
        {% else %}hcc_recapture{%- endif -%}
      alias: recapture_rates_monthly
      tags: [ "hcc_recapture", "final" ]
      materialized: table
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - payer
              - payment_year
              - payment_year_month
    columns:
      - name: payer
        description: The name of the person (i.e. beneficiary) insurance provider.
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: payment_year
        description: >
          This is the year that the HCC should be coded. Typically the
          collection year + 1, but for open HCCs it will be the collection year
          + 2.  To illustrate, if we have an HCC claim in 2023, but not in 2024,
          that means it is open in 2024. The payment year is 2024 + 1 = 2025.
          So  an open HCC from 2023 will have a payment year = 2025.
        config:
          meta:
            data_type: integer
            is_primary_key: true
      - name: payment_year_month
