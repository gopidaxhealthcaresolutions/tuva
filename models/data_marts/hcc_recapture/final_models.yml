        config:
          meta:
            data_type: number
      - name: closed_hccs
        description: The number of HCCs that were closed the payment month. See the
          definition of closed HCCs in the gap_status field in the gap_status
          model.
        config:
          meta:
            data_type: integer
      - name: open_hccs
        description: The number of HCCs that are open in the payment month. See the
          definition of open HCCs in the gap_status field in the gap_status
          model.
        config:
          meta:
            data_type: integer
      - name: total_hccs
        description: The total number of HCCs that were open or closed in the payment
          month. Excludes new and inappropriate for recapture HCCs.
        config:
          meta:
            data_type: integer
      - name: recapture_rate
        description: Closed HCCs divided by Total HCCs in the given payment month.
        config:
          meta:
            data_type: number

